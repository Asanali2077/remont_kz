name: CI

on:
  push:
    branches: [main, diploma-dev]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: lint-type-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/remont_kz
          JWT_SECRET: ci-test-secret-32-characters-long
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ANTHROPIC_API_KEY: sk-ant-placeholder
